<!DOCTYPE html>
<html lang="en">
	<head>
		<title>Functions</title>
	</head>
	<body>
		<h1>functions</h1>
		<script>
		console.log("test");

		function sayHi(){
			console.log("hi");
		}

		sayHi();

		function sayHiToSomeone(who){
			console.log("hi, "+who);
		}

		sayHiToSomeone("Chris");
		sayHiToSomeone("Micah");
		sayHi();

		function sayHiToTwoPeople(who1, who2){
			console.log("hi, " + who1 + " and " +who2)
		}

		sayHiToTwoPeople("Romeo", "Juliet")

		</script>
	</body>
</html>
