<!DOCTYPE html>
<html lang="en">
	<head>
		<title>This is a canvas</title>
		<style>
			canvas{
				border: black 1px solid;
			}
		</style>
	</head>
	<body>
		<h1>This is a canvas</h1>
		<canvas id="canvas" width="800" height="800">

		</canvas>
		<script>
		const canvas = document.getElementById("canvas");
		const ctx = canvas.getContext("2d");
		ctx.fillStyle = "#000000"
		ctx.fillRect(0, 0, 800, 800);

		ctx.fillStyle = "green";
		ctx.fillRect(100, 100, 200, 300);
		ctx.fillStyle = "red";
		ctx.fillRect(350, 50, 100, 100);

		ctx.fillStyle = "white";
		ctx.strokeStyle = "red";
		ctx.lineWidth = 10;
		ctx.beginPath();
		ctx.arc(400, 400, 100, 0, Math.PI);
		ctx.fill();
		ctx.stroke()

		ctx.fillStyle = "purple";
		ctx.beginPath();
		ctx.ellipse(400, 600, 300, 100, 0, 0, 2*Math.PI);
		ctx.fill();

		ctx.fillStyle = "blue";
		ctx.beginPath();
		ctx.moveTo(700, 10);
		ctx.lineTo(790, 150);
		ctx.lineTo(610, 150);
		ctx.lineTo(700, 10);
		ctx.fill();
		ctx.stroke();
		</script>
	</body>
<html>
